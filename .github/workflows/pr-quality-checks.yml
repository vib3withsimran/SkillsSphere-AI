name: PR Quality Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  docs_and_workflow_checks:
    name: Docs and Workflow Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint Markdown files
        run: npx -y markdownlint-cli2 "**/*.md" "!**/node_modules/**" "!**/venv/**" "!**/.venv/**"

      - name: Lint GitHub Actions workflow syntax
        uses: reviewdog/action-actionlint@v1


  repo_guardrails:
    name: Repository Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure required community files exist
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f SECURITY.md
          test -f .github/PULL_REQUEST_TEMPLATE.md
          test -f .github/ISSUE_TEMPLATE/bug_report.md
          test -f .github/ISSUE_TEMPLATE/feature_request.md
          test -f .github/ISSUE_TEMPLATE/config.yml


  client_checks:
    name: Client Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check client exists
        id: client_check
        run: |
          if [ -f client/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.client_check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.client_check.outputs.exists == 'true'
        working-directory: client
        run: npm ci

      - name: Run lint
        if: steps.client_check.outputs.exists == 'true'
        working-directory: client
        run: npm run lint --if-present

      - name: Run tests
        if: steps.client_check.outputs.exists == 'true'
        working-directory: client
        run: npm test --if-present

      - name: Run build
        if: steps.client_check.outputs.exists == 'true'
        working-directory: client
        run: npm run build --if-present


  server_checks:
    name: Server Checks
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check server exists
        id: server_check
        run: |
          if [ -f server/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.server_check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.server_check.outputs.exists == 'true'
        working-directory: server
        run: npm ci

      - name: Run lint
        if: steps.server_check.outputs.exists == 'true'
        working-directory: server
        run: npm run lint --if-present

      - name: Run tests
        if: steps.server_check.outputs.exists == 'true'
        working-directory: server
        env:
          MONGO_URI: mongodb://localhost:27017/test_db
          JWT_SECRET: ci_test_secret
        run: npm test --if-present

      - name: Run build
        if: steps.server_check.outputs.exists == 'true'
        working-directory: server
        run: npm run build --if-present


  aiml_checks:
    name: AI-ML Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check AI-ML exists
        id: aiml_check
        run: |
          if [ -f ai-ml/requirements.txt ] || [ -f ai-ml/pyproject.toml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.aiml_check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (requirements)
        if: steps.aiml_check.outputs.exists == 'true' && hashFiles('ai-ml/requirements.txt') != ''
        run: pip install -r ai-ml/requirements.txt

      - name: Install dependencies (pyproject)
        if: steps.aiml_check.outputs.exists == 'true' && hashFiles('ai-ml/pyproject.toml') != ''
        working-directory: ai-ml
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run pytest if tests exist
        working-directory: ai-ml
        run: |
          if [ -d tests ]; then
            python -m pytest -q
          else
            echo "No ai-ml tests directory yet. Skipping pytest."
          fi